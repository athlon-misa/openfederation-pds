name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: openfederation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build SDK
        run: npm run build:sdk

      - name: Validate lexicon schemas
        run: npm run validate:lexicon

      - name: Validate lexicon revision fields
        run: npm run lexicon:validate

      - name: Run unit tests
        run: npm run test:unit
        env:
          AUTH_JWT_SECRET: ci-test-secret-minimum-32-characters-long
          KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chars

      - name: Initialize test database schema and run migrations
        run: |
          psql -h localhost -U test -d openfederation_test -f src/db/schema.sql
          for f in scripts/migrate-*.sql; do
            echo "Running $f..."
            psql -h localhost -U test -d openfederation_test -f "$f"
          done
        env:
          PGPASSWORD: test

      - name: Seed bootstrap admin for integration tests
        run: node --loader ts-node/esm scripts/seed-bootstrap-admin.ts
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: openfederation_test
          DB_USER: test
          DB_PASSWORD: test
          AUTH_JWT_SECRET: ci-test-secret-minimum-32-characters-long
          KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chars
          BOOTSTRAP_ADMIN_HANDLE: admin
          BOOTSTRAP_ADMIN_EMAIL: admin@test.local
          BOOTSTRAP_ADMIN_PASSWORD: AdminPass1234

      - name: Run integration tests
        run: npm run test:api
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          # Tests run against openfederation_test (the Postgres service DB
          # seeded above). setup.ts enforces TEST_DB_NAME !== DB_NAME and
          # then overrides DB_NAME with TEST_DB_NAME — so DB_NAME here is
          # a placeholder that never gets connected to.
          DB_NAME: openfederation_ci_placeholder
          TEST_DB_NAME: openfederation_test
          DB_USER: test
          DB_PASSWORD: test
          AUTH_JWT_SECRET: ci-test-secret-minimum-32-characters-long
          KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chars
          BOOTSTRAP_ADMIN_HANDLE: admin
          BOOTSTRAP_ADMIN_EMAIL: admin@test.local
          BOOTSTRAP_ADMIN_PASSWORD: AdminPass1234
          PDS_HOSTNAME: localhost
          PDS_SERVICE_URL: http://localhost:8080
          EXPORT_SCHEDULER_ENABLED: "false"
