name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: openfederation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build SDK
        run: npm run build:sdk

      - name: Run unit tests
        run: npm run test:unit
        env:
          AUTH_JWT_SECRET: ci-test-secret-minimum-32-characters-long
          KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chars

      - name: Run integration tests
        run: npm run test:api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openfederation_test
          DB_USER: test
          DB_PASSWORD: test
          AUTH_JWT_SECRET: ci-test-secret-minimum-32-characters-long
          KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chars
