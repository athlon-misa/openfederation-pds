name: Create Security Issues
on:
  push:
    branches:
      - 'copilot/deep-dive-security-exploits'
    paths:
      - '.github/workflows/create-security-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create security issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = [
              {
                title: "security(cli): change-password exposes passwords in shell history and process list",
                body: `## Summary
The \`ofc account change-password\` command accepts both \`--current <password>\` and \`--new <password>\` as CLI flags. This means passwords are:
- Stored verbatim in \`~/.bash_history\` / \`~/.zsh_history\`
- Visible to any user who runs \`ps aux\` or reads \`/proc/<pid>/cmdline\` while the command is running
- Captured by CI/CD log systems if used in scripts

## Affected File
\`cli/ofc.ts\` — \`account change-password\` command (lines 303–320)

\`\`\`ts
.requiredOption('--current <password>', 'Current password')
.requiredOption('--new <password>', 'New password')
\`\`\`

## Recommended Fix
Replace \`--current\` / \`--new\` option flags with interactive \`promptPassword()\` calls (the same pattern used by \`auth login\`), and add a \`--password-stdin\` option for scripted use. No passwords should be accepted as positional arguments or named options.

\`\`\`ts
// Prompt interactively for current password (hidden)
// Prompt interactively for new password (hidden)
// --current-stdin / --new-stdin to read from pipe for CI
\`\`\`

## Severity
🔴 **Critical** — silently leaks credentials on every use today.

## Labels
\`security\`, \`cli\``,
                labels: ["security"],
              },
              {
                title: "security(auth): no per-account brute-force / login-attempt protection",
                body: `## Summary
The global \`authLimiter\` (20 requests / 15 min per IP) is the **only** protection against credential guessing. A distributed attack using one guess per IP can exhaust the entire password space of low-entropy accounts without triggering any limit. There is no per-account failed-login counter, no lockout, no progressive delay, and no alert.

## Affected File
\`src/api/com.atproto.server.createSession.ts\`

## Recommended Fix
1. Add \`failed_login_attempts\` and \`locked_until\` columns to the \`users\` table.
2. Increment the counter on each failed authentication attempt for the matched account.
3. After 5 consecutive failures apply an exponential back-off lockout (e.g., 1 min → 5 min → 30 min).
4. Emit an audit log entry for each failed login including the IP address.
5. Reset the counter on successful login.

## Severity
🔴 **Critical** — no mitigations exist beyond per-IP rate limiting.

## Labels
\`security\`, \`auth\``,
                labels: ["security"],
              },
              {
                title: "security(activitypub): RSA keypair seed is computed but never applied — key is random per restart",
                body: `## Summary
In \`src/activitypub/ap-routes.ts\`, a deterministic seed is derived from the community DID and \`KEY_ENCRYPTION_SECRET\` but is **never passed** to \`crypto.generateKeyPairSync\` (which has no seed parameter). As a result:

1. Each server restart generates a **completely different** RSA keypair for every community DID.
2. In a multi-instance deployment, different instances have **different keys** for the same community.
3. ActivityPub HTTP Signatures are repudiated on every restart, breaking federation with Mastodon / GoToSocial.

## Affected File
\`src/activitypub/ap-routes.ts\` (lines 28–45)

\`\`\`ts
const seed = crypto.createHash('sha256')
  .update(\`ap-rsa-\${did}-\${config.keyEncryptionSecret}\`)
  .digest('hex');

// seed is never used — generateKeyPairSync ignores it
const { publicKey } = crypto.generateKeyPairSync('rsa', { ... });
\`\`\`

## Recommended Fix
Store RSA keypairs in the database (linked to the community DID), generating them once and persisting them so they survive restarts and are consistent across instances. Encrypt the private key at rest using the existing \`encryptKeyBytes\` helper.

## Severity
🟠 **High** — breaks ActivityPub federation on every restart.

## Labels
\`security\`, \`activitypub\`, \`bug\``,
                labels: ["security", "bug"],
              },
              {
                title: "security(auth): users cannot view or revoke their own active sessions",
                body: `## Summary
A user who suspects account compromise has no way to:
- See which sessions are currently active (device, last used, IP)
- Revoke individual sessions they don't recognise

The database has all the required data (\`sessions\` table with \`id\`, \`user_id\`, \`expires_at\`, \`last_used_at\`) — the API endpoints simply don't exist.

The only current option is \`deleteSession\` which logs out the *current* session only. Admins similarly cannot view or revoke a specific user's sessions without manually querying the database.

## Recommended New Endpoints
- \`net.openfederation.account.listSessions\` — returns list of user's active sessions (self or admin view)
- \`net.openfederation.account.revokeSession\` — revokes a specific session by ID (self or admin)

## Recommended CLI Commands
\`\`\`
ofc account sessions list
ofc account sessions revoke <session-id>
ofc account sessions revoke-all
ofc admin account sessions list <handle>
ofc admin account sessions revoke-all <handle>
\`\`\`

## Severity
🟠 **High** — no incident response capability for compromised accounts.

## Labels
\`security\`, \`auth\`, \`api\`, \`cli\``,
                labels: ["security"],
              },
              {
                title: "security(auth): no self-service password reset mechanism",
                body: `## Summary
There is no password reset / forgot-password flow. A user who loses their password must contact the PDS administrator and request a manual reset. This:
- Puts the entire burden of identity verification on the admin
- Creates a **social engineering attack surface**: an attacker can impersonate a legitimate user, contact the admin, and request a password reset
- Is a poor user experience with no recovery path

## Recommended Fix
Implement an email-based reset flow:
1. User submits their email/handle to a \`POST /xrpc/net.openfederation.account.requestPasswordReset\` endpoint
2. A time-limited (e.g., 1 hour), single-use reset token is generated and emailed
3. User submits the token + new password to \`POST /xrpc/net.openfederation.account.confirmPasswordReset\`
4. Success: password updated, all sessions revoked, audit log entry written

Also add a CLI command for admins to trigger a reset email on behalf of a user:
\`\`\`
ofc admin account reset-password <handle>    # sends reset email
\`\`\`
And an identity verification challenge (sign a nonce with the DID signing key) to allow admins to verify identity before manual reset.

## Severity
🟠 **High** — no secure account recovery path; social engineering risk.

## Labels
\`security\`, \`auth\`, \`api\``,
                labels: ["security"],
              },
              {
                title: "security(crypto): pbkdf2Sync blocks the Node.js event loop during key encryption/decryption",
                body: `## Summary
\`src/auth/encryption.ts\` uses \`crypto.pbkdf2Sync\` with 100,000 iterations for key derivation. This blocks the Node.js event loop for ~50–100 ms per call. Since key encryption/decryption is triggered on community creation, identity operations, and repo signing, this creates measurable latency spikes under load.

Under a sustained rate of parallel identity operations (e.g., many simultaneous registrations), this can be weaponised as a **DoS amplifier**.

## Affected File
\`src/auth/encryption.ts\` (line 12)

\`\`\`ts
function deriveKey(secret: string, salt: Buffer): Buffer {
  return crypto.pbkdf2Sync(secret, salt, ITERATIONS, KEY_LENGTH, 'sha512');
}
\`\`\`

## Recommended Fix
\`\`\`ts
import { promisify } from 'util';
const pbkdf2 = promisify(crypto.pbkdf2);
async function deriveKey(secret: string, salt: Buffer): Promise<Buffer> {
  return pbkdf2(secret, salt, ITERATIONS, KEY_LENGTH, 'sha512');
}
\`\`\`
Make \`encryptKeyBytes\` and \`decryptKeyBytes\` \`async\` — they are already called from async contexts.

## Severity
🟠 **High** — event loop blocking under load; potential DoS amplifier.

## Labels
\`security\`, \`performance\``,
                labels: ["security", "performance"],
              },
              {
                title: "security(oauth): in-memory pending-code Map has no size cap (memory DoS)",
                body: `## Summary
\`src/oauth/external-routes.ts\` stores OAuth callback pending-codes in an unbounded in-memory \`Map\`:

\`\`\`ts
const pendingCodes = new Map<string, { tokens: LocalTokens; expiresAt: number }>();
\`\`\`

The per-IP rate limiter (30 initiations / 15 min) only limits a single IP. An attacker with rotating IPs can create tens of thousands of entries. Each entry holds a full token payload. While codes expire after 60 seconds, a sustained attack with enough IPs can exhaust available heap memory.

## Recommended Fix
Cap the Map at a sane maximum (e.g., 10,000 entries) and evict the oldest entry on insert when at capacity:

\`\`\`ts
const MAX_PENDING_CODES = 10_000;

function addPendingCode(code: string, entry: { tokens: LocalTokens; expiresAt: number }): void {
  if (pendingCodes.size >= MAX_PENDING_CODES) {
    // Evict the oldest (first) entry
    const first = pendingCodes.keys().next().value;
    if (first) pendingCodes.delete(first);
  }
  pendingCodes.set(code, entry);
}
\`\`\`

## Severity
🟠 **High** — memory exhaustion / denial of service.

## Labels
\`security\`, \`oauth\``,
                labels: ["security"],
              },
              {
                title: "security(server): no Content Security Policy (CSP) header set",
                body: `## Summary
The server sets several security headers (\`X-Frame-Options\`, \`X-Content-Type-Options\`, etc.) but does **not** set a \`Content-Security-Policy\` header. The server renders HTML at \`/\` and serves \`/sdk/v1.js\`. Without CSP, any stored/reflected user-controlled content in a browser context has no XSS mitigation fallback.

## Affected File
\`src/server/index.ts\` (security headers middleware, lines 117–126)

## Recommended Fix
Add to the security headers middleware:

\`\`\`ts
res.setHeader(
  'Content-Security-Policy',
  "default-src 'none'; script-src 'self'; connect-src 'self'; " +
  "img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'"
);
\`\`\`

This can be adjusted based on what the web UI and SDK actually need, but a restrictive default is the right starting point.

## Severity
🟡 **Medium** — missing defence-in-depth layer against XSS.

## Labels
\`security\``,
                labels: ["security"],
              },
              {
                title: "security(audit): failed login attempts are not written to the audit log",
                body: `## Summary
Every successful login is trackable (a session row is created), but **failed authentication attempts are not recorded** in the audit log. This makes it impossible to detect brute-force attacks, credential stuffing campaigns, or compromised accounts after the fact by reviewing audit records.

## Affected File
\`src/api/com.atproto.server.createSession.ts\`

## Recommended Fix
Add an audit log entry on each failed authentication attempt:

\`\`\`ts
await auditLog('session.loginFailed', null, user?.id ?? null, {
  identifier: input.identifier,
  reason: 'wrong_password' | 'account_not_found' | 'account_suspended' | ...,
  ip: req.ip,
});
\`\`\`

Also extend the \`AuditAction\` type in \`src/db/audit.ts\` to include \`'session.loginFailed'\`.

## Severity
🟡 **Medium** — prevents post-incident forensic analysis.

## Labels
\`security\`, \`audit\``,
                labels: ["security"],
              },
              {
                title: "security(federation): peer health checks lack SSRF guard",
                body: `## Summary
The SSRF guard (\`isPrivateHost\`) in \`src/federation/remote-verify.ts\` protects \`resolveDidToPds\` and \`fetchRemoteRecord\`, but the **peer health check** in \`src/federation/peer-cache.ts\` fetches \`{peerUrl}/health\` without validating the peer hostname through the SSRF guard.

A malicious \`PEER_PDS_URLS\` entry (or a future admin API to add peers) could cause the server to make HTTP requests to internal services (metadata endpoints, database ports, etc.).

## Affected File
\`src/federation/peer-cache.ts\` — peer health fetch

## Recommended Fix
Export \`isPrivateHost\` from \`remote-verify.ts\` and call it before fetching any peer URL:

\`\`\`ts
import { isPrivateHost } from './remote-verify.js';

// Before fetching peer health:
const peerHostname = new URL(peerUrl).hostname;
if (isPrivateHost(peerHostname)) {
  console.warn(\`Skipping peer \${peerUrl}: private/internal host\`);
  continue;
}
\`\`\`

## Severity
🟡 **Medium** — SSRF risk via peer URL configuration.

## Labels
\`security\`, \`federation\``,
                labels: ["security"],
              },
              {
                title: "security(api): attestation claim field has no size or depth limit",
                body: `## Summary
The \`claim\` field in \`net.openfederation.community.issueAttestation\` accepts **arbitrary nested JSON objects** with no depth limit or per-field size check. While the global 256 KB body limit provides an outer cap, a deeply-nested or maliciously crafted claim object could:
- Cause unbounded recursion in any serialiser/traverser that processes it
- Embed proto-XSS payloads that web UIs might render without sanitisation
- Inflate storage in \`records_index\` with large JSONB values

## Affected File
\`src/api/net.openfederation.community.issueAttestation.ts\`

## Recommended Fix
Add an explicit size limit on the serialised claim object:

\`\`\`ts
const MAX_CLAIM_SIZE = 4096; // 4 KB
const claimJson = JSON.stringify(claim);
if (claimJson.length > MAX_CLAIM_SIZE) {
  return res.status(400).json({
    error: 'PayloadTooLarge',
    message: \`claim must not exceed \${MAX_CLAIM_SIZE} bytes when serialised\`,
  });
}
\`\`\`

Also consider banning keys that begin with \`$\` or contain HTML metacharacters at the top level.

## Severity
🟡 **Medium** — storage inflation; potential XSS via downstream rendering.

## Labels
\`security\`, \`api\``,
                labels: ["security"],
              },
              {
                title: "security(api): invite.create has no per-issuer rate limit",
                body: `## Summary
Any admin or moderator can call \`net.openfederation.invite.create\` with no throttling. A compromised moderator account (or a malicious moderator) can generate unlimited invite codes and distribute them, enabling mass-registration attacks that bypass \`INVITE_REQUIRED\`.

## Affected File
\`src/api/net.openfederation.invite.create.ts\` — no rate limiter applied in route registration (\`src/server/index.ts\`)

## Recommended Fix
Apply a per-user rate limit on invite creation:

**Option A** — Apply the existing \`createLimiter\` to the route:
\`\`\`ts
'net.openfederation.invite.create': { handler: createInvite, limiter: createLimiter },
\`\`\`

**Option B** — Add a max-active-invites check per issuer (e.g., max 50 unused invite codes at a time per moderator).

Also write an audit entry for every invite creation that includes the code's expiry and max-uses, so bulk creation is visible in the audit log.

## Severity
🟡 **Medium** — invite-gated registration can be bypassed by a compromised moderator.

## Labels
\`security\`, \`api\``,
                labels: ["security"],
              },
              {
                title: "docs(deployment): trust proxy level needs environment-specific documentation",
                body: `## Summary
\`src/server/index.ts\` sets \`app.set('trust proxy', 1)\` which trusts exactly one proxy hop. Deployments with Cloudflare + Railway have **two proxy hops**, meaning the rate limiter may see Cloudflare's anycast IP rather than the real client IP — defeating per-IP rate limiting entirely.

Conversely, a direct-IP deployment with \`trust proxy: 1\` is correct. An incorrectly set value is a subtle misconfiguration that silently breaks rate limiting.

## Recommended Changes
1. Add an \`EXPRESS_TRUST_PROXY\` environment variable (default: \`1\`) that maps to Express's trust-proxy setting.
2. Document the correct value for each supported deployment topology in \`DEPLOYMENT.md\`:
   - Direct / VPS: \`1\`
   - Railway only: \`1\`
   - Cloudflare + Railway: \`2\` (or \`true\` to trust all)
   - Behind a known reverse proxy IP: the specific IP address
3. Add to \`.env.example\` with a comment.

## Severity
🟡 **Medium** — incorrect trust-proxy silently breaks IP-based rate limiting.

## Labels
\`security\`, \`docs\`, \`deployment\``,
                labels: ["security", "documentation"],
              },
              {
                title: "security(social): PLC rotation key — no warning that PDS will never request it again",
                body: `## Summary
When a community or user DID is created, a **primary rotation key** is shown exactly once with the message: *"IMPORTANT: Please back up your primaryRotationKey. This is the only time you will see it."* However there is no explicit warning that **the PDS will never request this key** and that any request for it is a phishing attempt.

**Attack scenario:** An attacker (or compromised moderator) sends a message to a community creator: *"Your rotation key has been flagged as compromised. Please submit it to security@openfederation.net for re-issuance."* Users who kept the key in notes may send it, granting the attacker full control over the DID.

## Recommended Fix
1. Update the key-creation message and CLI output to explicitly state: *"OpenFederation and PDS operators will NEVER ask you for this key. Any request for it is a phishing attempt."*
2. Add a **"What We Will Never Ask"** section to \`SECURITY.md\` covering rotation keys, passwords, and session tokens.
3. Include the same warning text in the web UI's key-display component.

## Severity
🔴 **Critical (social)** — total DID takeover if key is phished.

## Labels
\`security\`, \`identity\`, \`documentation\``,
                labels: ["security", "documentation"],
              },
              {
                title: "security(social): admin password-reset has no identity verification protocol",
                body: `## Summary
There is no self-service password reset (see related issue). Users must contact the PDS admin to recover access. However, there is **no defined identity verification protocol** for admins to follow before resetting a password.

**Attack scenario:** An attacker impersonates a legitimate user, emails the PDS admin: *"Hi, I'm alice, I've lost access to my account. My DID is did:plc:... Can you reset my password?"* The admin cannot verify identity from an email alone, so may comply, handing the account to the attacker.

## Recommended Fix
1. Define an **identity verification protocol** in \`DEPLOYMENT.md\`: admin must require the user to prove DID control by signing a server-issued nonce with their signing key.
2. Add a CLI command: \`ofc admin account verify <handle>\` — issues a nonce challenge that the user must sign with their local key; the server verifies the signature against the published DID document.
3. Document that admins should **never** reset a password based solely on an email request.

## Severity
🟠 **High (social)** — account takeover via social engineering of the admin.

## Labels
\`security\`, \`identity\`, \`documentation\``,
                labels: ["security", "documentation"],
              },
              {
                title: "security(social): reserved handle list too narrow — handle squatting enables impersonation",
                body: `## Summary
The reserved handles list in \`src/auth/utils.ts\` covers obvious names (\`admin\`, \`moderator\`, \`support\`) but misses many common trust-signal handles. An attacker can register \`security\`, \`official\`, \`staff\`, \`team\`, \`legal\`, or \`privacy\` and send messages to community members appearing to represent the platform.

**Attack scenario:** Attacker registers \`security\` on a PDS and DMs members: *"Hello, I'm from the OpenFederation security team. We've detected suspicious activity. Please share your current session token so we can investigate."*

## Recommended Fix
Expand \`RESERVED_HANDLES\` in \`src/auth/utils.ts\` to include:

\`\`\`ts
'official', 'security', 'staff', 'team', 'ops', 'operations',
'abuse', 'contact', 'info', 'news', 'legal', 'privacy', 'tos',
'trust', 'safety', 'bot', 'service', 'noreply', 'no-reply',
\`\`\`

Also consider adding a \`verified_operator\` role (separate from \`admin\`) that is visually distinguished in the UI, so legitimate platform staff can be identified without relying on handle alone.

## Severity
🟠 **High (social)** — platform impersonation enabling credential theft.

## Labels
\`security\`, \`auth\``,
                labels: ["security"],
              },
              {
                title: "security(social): community transfer needs time-delay and owner email notification",
                body: `## Summary
\`net.openfederation.community.transfer\` transfers community ownership immediately with no:
- Confirmation delay
- Email notification to the current owner
- Re-authentication requirement

If a community owner's session is stolen, a community transfer is instant and irreversible. A stolen moderator session that gains temporary owner access (e.g., via a privilege escalation bug) can do the same.

## Recommended Fix
1. **Require re-authentication** (current password confirmation) to initiate a transfer.
2. **Introduce a 48-hour hold period** before the transfer takes effect — send the current owner an email with a cancellation link.
3. **Add CLI confirmation requirement** (matching the pattern already used by \`community delete\`):
   \`\`\`
   ofc community transfer <did> --new-owner <did> --confirm "I understand this is irreversible"
   \`\`\`
4. Emit an audit log entry with high-severity flag so monitors can alert on transfers.

## Severity
🟠 **High (social)** — irreversible community takeover via stolen session.

## Labels
\`security\`, \`api\`, \`cli\``,
                labels: ["security"],
              },
              {
                title: "security(social): fake partner key registration — no domain verification required",
                body: `## Summary
Partner keys bypass invite requirements and auto-approve users. They are created by PDS admins and granted to trusted third-party apps. However, there is **no domain verification or vetting process** defined. A malicious actor can register a plausible-sounding app and request a partner key via email.

**Attack scenario:** Attacker creates a GitHub page for "OpenFederation Mobile Client", emails the PDS operator requesting a partner key. Key is granted. The attacker's app auto-creates approved accounts for spam/abuse/credential stuffing.

## Recommended Fix
1. Require a \`domain\` field when requesting a partner key; verify domain ownership via DNS TXT record challenge (similar to Let's Encrypt domain validation).
2. Set a **low default rate limit** for new partner keys (e.g., 10 registrations/hour) requiring an explicit increase request with justification.
3. Add CLI monitoring: \`ofc partner activity <id> --hours 1\` should flag any key using >50% of its hourly limit.
4. Make \`allowed_origins\` required (not optional) for all new partner keys.
5. Document the vetting process in \`DEPLOYMENT.md\`.

## Severity
🟠 **High (social)** — partner keys enable mass account creation bypassing invite-gating.

## Labels
\`security\`, \`api\`, \`documentation\``,
                labels: ["security", "documentation"],
              },
              {
                title: "security(social): bootstrap admin password env var not cleared after initial setup",
                body: `## Summary
\`BOOTSTRAP_ADMIN_PASSWORD\` is set in \`.env\` and read at every server startup. Many operators leave this set indefinitely — meaning:
- The password is readable by anyone with filesystem access (container escape, misconfigured permissions, path traversal)
- It will appear in environment variable dumps (e.g., debug endpoints, misconfigured health checks)
- It is often committed to version control by accident despite \`.gitignore\`

The current code correctly skips re-creating the admin if it already exists, but provides **no warning** that the variable should be removed after first use.

## Recommended Fix
1. After detecting the bootstrap admin already exists in the database, print a **startup warning** if \`BOOTSTRAP_ADMIN_PASSWORD\` is still set:
   \`\`\`
   ⚠️  WARNING: BOOTSTRAP_ADMIN_PASSWORD is still set in your environment.
       The admin account is already created — remove this variable now to reduce your attack surface.
   \`\`\`
2. Update \`.env.example\` comment: *"Remove this variable after first startup. Keeping it set is a security risk."*
3. Consider supporting \`BOOTSTRAP_ADMIN_PASSWORD_FILE\` (Docker secrets pattern) as an alternative.

## Severity
🟡 **Medium (social)** — credential exposure via environment variable persistence.

## Labels
\`security\`, \`deployment\`, \`documentation\``,
                labels: ["security", "documentation"],
              },
              {
                title: "security(social): ATProto OAuth redirect does not show the target PDS URL before redirecting",
                body: `## Summary
The external ATProto login flow (\`GET /auth/atproto?handle=...&redirect_uri=...\`) silently redirects users to their home PDS for consent. Users are conditioned to accept redirects as part of login flows.

**Attack scenario:** Attacker registers a convincing domain (e.g., \`bsky.community\`, \`bluesky-auth.net\`) as a did:web PDS, creates a user handle there, then sends phishing links: *"Your account needs re-verification. Click here to log in: https://realpds.example.com/auth/atproto?handle=victim@bsky.community"*. The user is transparently sent to the attacker's fake PDS login page.

## Recommended Fix
1. **Before redirect**, render an intermediate confirmation page showing the full PDS URL prominently: *"You will be redirected to \`https://bsky.community\` to authenticate. Verify this is your home PDS before continuing."*
2. Add a **delay + explicit "Continue" button** for first-time or unfamiliar PDS domains.
3. Warn visually if the handle domain doesn't match the resolved PDS service endpoint domain.

## Severity
🟡 **Medium (social)** — transparent credential phishing via external PDS redirect.

## Labels
\`security\`, \`oauth\``,
                labels: ["security"],
              },
              {
                title: "cli: add ofc account sessions list/revoke commands",
                body: `## Summary
Users currently have no way to see or manage their active sessions from the CLI. The \`ofc auth logout\` command only logs out the current session. If a device is lost or a session is suspected to be compromised, the only option is to change the password (which invalidates all sessions).

## Proposed Commands

\`\`\`
ofc account sessions list
\`\`\`
Lists all active sessions for the current user:
| ID (prefix) | Created | Last used | Expires |
|---|---|---|---|
| abc123... | 2 hours ago | 5 minutes ago | in 29 days |

\`\`\`
ofc account sessions revoke <session-id>
\`\`\`
Revokes a specific session by its ID.

\`\`\`
ofc account sessions revoke-all
\`\`\`
Revokes all sessions (equivalent to changing password without changing password).

**Admin variants:**
\`\`\`
ofc admin account sessions list <handle>
ofc admin account sessions revoke-all <handle>
\`\`\`

## Required API Changes
These commands require new XRPC endpoints:
- \`net.openfederation.account.listSessions\`
- \`net.openfederation.account.revokeSession\`

## Labels
\`cli\`, \`security\``,
                labels: ["enhancement"],
              },
              {
                title: "cli: add ofc security check-config command",
                body: `## Summary
Add a \`ofc security check-config\` command that validates the PDS server configuration for common security misconfigurations. This is essential for operators who may not be aware of all required settings.

## Proposed Output

\`\`\`
$ ofc security check-config
✔ AUTH_JWT_SECRET: strong (64 chars)
✔ KEY_ENCRYPTION_SECRET: set
⚠ BOOTSTRAP_ADMIN_PASSWORD: still set — remove after first startup
✘ DB_SSL: false — enable SSL for production databases
⚠ REDIS_URL: not set — OAuth replay protection is in-memory only
✔ NODE_ENV: production
✔ INVITE_REQUIRED: true
✔ OAUTH_SIGNING_KEY: set (not auto-generated)
✔ Access token TTL: 15m (recommended)
\`\`\`

## Checks to Implement
- \`AUTH_JWT_SECRET\` ≥ 32 chars and not a known default
- \`KEY_ENCRYPTION_SECRET\` is set
- \`OAUTH_SIGNING_KEY\` is set (not auto-generated) in production
- \`BOOTSTRAP_ADMIN_PASSWORD\` cleared after initial setup
- \`DB_SSL=true\` in production
- \`NODE_ENV=production\` is set
- Redis configured (not in-memory OAuth token store)
- \`INVITE_REQUIRED=true\`
- \`ACCESS_TOKEN_TTL\` ≤ 15m (warn if longer)

## Implementation Notes
The command calls \`net.openfederation.server.getConfig\` (admin) and displays config values. Sensitive values should never be echoed — only their presence/strength is checked.

