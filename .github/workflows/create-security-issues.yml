                body: `## Summary
Invite codes are 12-byte random strings shared out-of-band (email, Slack, DM). Currently any recipient of an invite code can use it — there is no way to bind a code to a specific recipient. This means:
1. Intercepted invite codes can be used by anyone
2. Moderators have no record of who an invite was intended for

## Proposed Change

Add optional \`--bound-to <email>\` and \`--note <text>\` options to \`ofc invite create\`:

\`\`\`
ofc invite create --bound-to alice@example.com --note "Invited by Bob from team meeting"
\`\`\`

When \`boundTo\` is set, the registration endpoint should verify that the registering email matches \`boundTo\` (case-insensitive, after normalization) before accepting the invite code.

## API Changes Required
- \`net.openfederation.invite.create\`: add optional \`boundTo\` (email) and \`note\` (string) fields
- \`net.openfederation.account.register\`: validate \`boundTo\` match when set on the invite record
- \`invites\` table: add \`bound_to\` (email, nullable) and \`note\` (text, nullable) columns

