name: Create Security Issues
on:
  push:
    branches:
      - 'copilot/deep-dive-security-exploits'
    paths:
      - '.github/security-issues.json'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create security issues from JSON
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const issues = JSON.parse(fs.readFileSync('.github/security-issues.json', 'utf8'));

            let created = 0;
            for (const issue of issues) {
              try {
                const result = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels || [],
                });
                console.log(`Created #${result.data.number}: ${issue.title}`);
                created++;
                await new Promise(r => setTimeout(r, 300));
              } catch (err) {
                console.error(`Failed: "${issue.title}": ${err.message}`);
              }
            }
            console.log(`\nCreated ${created}/${issues.length} issues.`);
