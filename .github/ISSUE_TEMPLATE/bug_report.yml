name: Bug Report
description: Report a bug in OpenFederation PDS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Call endpoint X with payload Y
        2. Observe error Z
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g., 18.20.8"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15.3, Ubuntu 22.04"
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or other relevant details.
